version: '3.8'

# PotSnitch Test Suite - Honeypot Fleet
# Start with: docker-compose up -d
# Stop with: docker-compose down

services:
  # ============================================
  # SSH Honeypots
  # ============================================

  cowrie:
    image: cowrie/cowrie:latest
    container_name: potsnitch-cowrie
    ports:
      - "2222:2222"   # SSH
      - "2223:2223"   # Telnet
    environment:
      - COWRIE_TELNET_ENABLED=yes
    volumes:
      - cowrie-logs:/home/cowrie/cowrie/var/log/cowrie
      - cowrie-downloads:/home/cowrie/cowrie/var/lib/cowrie/downloads
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2222 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  sshesame:
    image: ghcr.io/jaksi/sshesame:latest
    container_name: potsnitch-sshesame
    ports:
      - "2225:2022"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2022 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  endlessh:
    image: linuxserver/endlessh:latest
    container_name: potsnitch-endlessh
    ports:
      - "2224:22"
    environment:
      - PUID=1000
      - PGID=1000
      - MSDELAY=1000
      - MAXLINES=32
      - MAXCLIENTS=4096
      - LOGFILE=true
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 22 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  # ============================================
  # Database Honeypots
  # ============================================

  elasticpot:
    # Maintained T-Pot image (bontchev/elasticpot is no longer on Docker Hub).
    image: dtagdevsec/elasticpot:24.04.1
    container_name: potsnitch-elasticpot
    ports:
      - "9201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  redis-honeypot:
    # Maintained T-Pot image (cypwnpwnsocute/redishoneypot is gone). It writes
    # to /var/log/redishoneypot, so back that path with a tmpfs.
    image: dtagdevsec/redishoneypot:24.04.1
    container_name: potsnitch-redis
    ports:
      - "6380:6379"
    tmpfs:
      - /var/log/redishoneypot
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6379 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  # ============================================
  # ICS/SCADA Honeypots
  # ============================================

  conpot:
    image: honeynet/conpot:latest
    container_name: potsnitch-conpot
    ports:
      - "10080:80"      # HTTP
      - "10102:102"     # S7Comm
      - "10502:502"     # Modbus
      - "10161:161/udp" # SNMP
    # The image's default CMD already runs `conpot --template default`; an
    # entrypoint-less `command:` override would exec "--template" as a binary.
    volumes:
      - conpot-logs:/var/log/conpot
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 502 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  # ============================================
  # Web Honeypots
  # ============================================

  hellpot:
    image: yunginnanet/hellpot:latest
    container_name: potsnitch-hellpot
    ports:
      - "8081:8080"
    environment:
      - HELLPOT_LOGGER_DEBUG=true
      - HELLPOT_HTTP_BIND_ADDR=0.0.0.0
      - HELLPOT_HTTP_BIND_PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  # ============================================
  # Multi-Service Honeypots
  # ============================================

  dionaea:
    image: dinotools/dionaea:latest
    container_name: potsnitch-dionaea
    ports:
      - "2121:21"       # FTP
      - "4080:80"       # HTTP
      - "4443:443"      # HTTPS
      - "4445:445"      # SMB
      - "11433:1433"    # MSSQL
      - "13306:3306"    # MySQL
      - "15060:5060"    # SIP
      - "15060:5060/udp"
    volumes:
      - dionaea-logs:/opt/dionaea/var/log
      - dionaea-binaries:/opt/dionaea/var/lib/dionaea/binaries
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 21 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  # ============================================
  # Email Honeypots
  # ============================================

  mailoney:
    # Maintained T-Pot image (phin3has/mailoney is gone). It ships preconfigured
    # as a schizo_open_relay, so the phin3has-specific command args are dropped.
    image: dtagdevsec/mailoney:24.04.1
    container_name: potsnitch-mailoney
    ports:
      - "2525:25"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 25 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  # ============================================
  # Telnet Honeypots
  # ============================================

  # Cowrie also provides telnet on 2223

  # ============================================
  # qeeqbox/honeypots services (DISABLED)
  # ============================================
  # The `qeeqbox/honeypots` image these used (mongodb 27018, postgres 5433,
  # ftp 2120, vnc 5901, rdp 3390, smtp 2526/5870) has been removed from Docker
  # Hub - `docker pull qeeqbox/honeypots` returns "repository does not exist".
  # A dead image ref aborts the whole `docker compose up`, so these are left
  # commented out until a maintained multi-protocol replacement is chosen.
  # None are referenced by tests/integration (ServiceEndpoints has no entries
  # for them). The mongodb/mysql/postgres/ftp/vnc/rdp/smtp detectors are still
  # covered: db detectors via Dionaea (mysql/mssql) and unit tests; smtp via the
  # mailoney service above.

volumes:
  cowrie-logs:
  cowrie-downloads:
  conpot-logs:
  dionaea-logs:
  dionaea-binaries:

networks:
  honeypot-net:
    name: potsnitch-test-network
    driver: bridge
